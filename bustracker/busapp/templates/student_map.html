{% extends 'base.html' %}
{% block title %}Live Map — BusTracker{% endblock %}

{% block content %}
<style>
    html,
    body {
        margin: 0;
        padding: 0;
        height: 100%;
    }

    .page {
        display: flex;
        width: 100%;
        height: calc(100vh - 60px);
        overflow: hidden;
        position: relative;
    }

    /* ── SIDEBAR ─────────────────────────────────────────────────── */
    .sidebar {
        width: 280px;
        min-width: 280px;
        background: #131929;
        border-right: 1px solid rgba(255, 255, 255, 0.08);
        display: flex;
        flex-direction: column;
        transition: transform 0.3s ease;
        z-index: 500;
    }

    .sidebar-header {
        padding: 14px 16px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        display: flex;
        align-items: center;
        justify-content: space-between;
    }

    .sidebar-title {
        font-size: 10px;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: #7a8499;
        margin-bottom: 4px;
    }

    .bus-list {
        flex: 1;
        overflow-y: auto;
        padding: 8px;
        display: flex;
        flex-direction: column;
        gap: 6px;
    }

    .bus-card {
        background: #1a2235;
        border: 1px solid rgba(255, 255, 255, 0.07);
        border-radius: 10px;
        padding: 12px;
        cursor: pointer;
        transition: all 0.2s;
    }

    .bus-card:hover,
    .bus-card.selected {
        border-color: rgba(62, 232, 160, 0.5);
        background: rgba(62, 232, 160, 0.06);
    }

    .bus-card-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 4px;
    }

    .bus-name {
        font-weight: 600;
        font-size: 14px;
        color: #e8eaf0;
    }

    .bus-route {
        font-size: 12px;
        color: #7a8499;
        margin-bottom: 8px;
    }

    .bus-stats {
        display: flex;
        gap: 12px;
    }

    .stat {
        display: flex;
        flex-direction: column;
    }

    .stat-label {
        font-size: 9px;
        color: #7a8499;
        text-transform: uppercase;
        letter-spacing: 0.8px;
    }

    .stat-value {
        font-size: 13px;
        font-weight: 700;
        color: #e8eaf0;
    }

    .stat-value.spd {
        color: #f5a623;
    }

    .pill {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        font-size: 10px;
        padding: 2px 8px;
        border-radius: 20px;
    }

    .pill.on {
        background: rgba(62, 232, 160, 0.12);
        color: #3ee8a0;
        border: 1px solid rgba(62, 232, 160, 0.3);
    }

    .pill.mv {
        background: rgba(245, 166, 35, 0.12);
        color: #f5a623;
        border: 1px solid rgba(245, 166, 35, 0.3);
    }

    .pill-dot {
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: currentColor;
    }

    .sidebar-footer {
        padding: 10px 16px;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
    }

    .ws-row {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        color: #7a8499;
    }

    .ws-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #f05252;
        transition: background 0.3s;
        flex-shrink: 0;
    }

    .ws-dot.ok {
        background: #3ee8a0;
    }

    /* ── MAP ─────────────────────────────────────────────────────── */
    .map-wrap {
        flex: 1;
        position: relative;
        min-width: 0;
    }

    #map {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
    }

    .chip {
        position: absolute;
        z-index: 1000;
        background: rgba(11, 15, 26, 0.9);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        padding: 6px 12px;
        font-size: 12px;
        color: #e8eaf0;
        pointer-events: none;
        max-width: calc(100% - 24px);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    #chip-bus {
        top: 12px;
        right: 12px;
    }

    #chip-time {
        top: 48px;
        right: 12px;
    }

    #chip-me {
        top: 84px;
        right: 12px;
    }

    #btn-follow {
        top: 120px;
        right: 12px;
        position: absolute;
        z-index: 1000;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        padding: 6px 12px;
        font-size: 12px;
        cursor: pointer;
        background: rgba(11, 15, 26, 0.9);
        color: #e8eaf0;
        pointer-events: all;
    }

    @keyframes mp {
        0% {
            transform: scale(1);
            opacity: .5
        }

        100% {
            transform: scale(3.5);
            opacity: 0
        }
    }

    /* ── MOBILE SIDEBAR TOGGLE ───────────────────────────────────── */
    .sidebar-toggle {
        display: none;
        align-items: center;
        justify-content: center;
        width: 34px;
        height: 34px;
        background: var(--surface2, #1a2235);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        cursor: pointer;
        font-size: 16px;
        color: #e8eaf0;
        flex-shrink: 0;
        z-index: 600;
    }

    /* Map toggle button (shown on mobile when sidebar is closed) */
    #map-bus-btn {
        display: none;
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 1000;
        background: rgba(11, 15, 26, 0.92);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 8px;
        padding: 7px 12px;
        font-size: 12px;
        color: #e8eaf0;
        cursor: pointer;
        gap: 6px;
        align-items: center;
    }

    /* ── TABLET (≤900px) ─────────────────────────────────────────── */
    @media (max-width: 900px) {
        .sidebar {
            width: 240px;
            min-width: 240px;
        }
    }

    /* ── MOBILE (≤640px) — sidebar slides over map ───────────────── */
    @media (max-width: 640px) {
        .sidebar {
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            width: 82vw;
            max-width: 320px;
            min-width: 0;
            transform: translateX(-100%);
            box-shadow: 4px 0 24px rgba(0, 0, 0, 0.5);
            border-right: 1px solid rgba(255, 255, 255, 0.12);
        }

        .sidebar.open {
            transform: translateX(0);
        }

        .sidebar-toggle {
            display: flex;
        }

        .sidebar-header {
            padding: 12px 14px;
        }

        /* Overlay behind sidebar */
        .sidebar-overlay {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            z-index: 490;
        }

        .sidebar-overlay.show {
            display: block;
        }

        /* Map bus count button */
        #map-bus-btn {
            display: flex;
        }

        /* Shift chips right so they don't overlap toggle */
        #chip-bus {
            right: 12px;
            top: 12px;
            max-width: 55vw;
        }

        #chip-time {
            right: 12px;
            top: 48px;
        }

        #chip-me {
            right: 12px;
            top: 84px;
            max-width: 55vw;
        }

        #btn-follow {
            right: 12px;
            top: 120px;
        }
    }

    /* ── Very small phones (≤380px) ─────────────────────────────── */
    @media (max-width: 380px) {

        #chip-bus,
        #chip-me {
            font-size: 11px;
            padding: 5px 10px;
            max-width: 50vw;
        }

        #chip-time,
        #btn-follow {
            font-size: 11px;
            padding: 5px 10px;
        }
    }
</style>

<div class="page">
    <!-- Overlay for mobile -->
    <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div>
                <div class="sidebar-title">Active Buses</div>
                <div id="bus-count" style="font-size:13px;color:#7a8499;">Connecting...</div>
            </div>
            <button class="sidebar-toggle" id="sidebar-close-btn" onclick="closeSidebar()" title="Close">✕</button>
        </div>
        <div class="bus-list" id="bus-list">
            <div style="padding:20px;text-align:center;color:#7a8499;font-size:13px;">Waiting for bus data...</div>
        </div>
        <div class="sidebar-footer">
            <div class="ws-row">
                <div class="ws-dot" id="ws-dot"></div>
                <span id="ws-label">Disconnected</span>
            </div>
        </div>
    </aside>

    <!-- MAP -->
    <div class="map-wrap">
        <!-- Mobile: button to open sidebar -->
        <button id="map-bus-btn" onclick="openSidebar()">
            🚌 <span id="map-bus-count-label">Buses</span>
        </button>

        <div class="chip" id="chip-bus">Select a bus to focus</div>
        <div class="chip" id="chip-me" style="color:#4a9eff;">Getting your location...</div>
        <button id="btn-follow">◎ Follow me</button>
        <div class="chip" id="chip-time">—</div>
        <div id="map"></div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
    // ── SIDEBAR TOGGLE (mobile) ───────────────────────────────────────────────
    function openSidebar() {
        document.getElementById('sidebar').classList.add('open');
        document.getElementById('sidebar-overlay').classList.add('show');
    }

    function closeSidebar() {
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('sidebar-overlay').classList.remove('show');
    }

    // Show close button only on mobile
    document.getElementById('sidebar-close-btn').style.display =
        window.innerWidth <= 640 ? 'flex' : 'none';
    window.addEventListener('resize', function () {
        document.getElementById('sidebar-close-btn').style.display =
            window.innerWidth <= 640 ? 'flex' : 'none';
        if (window.innerWidth > 640) {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('sidebar-overlay').classList.remove('show');
        }
    });

    // ── MAP ──────────────────────────────────────────────────────────────────────
    var map = L.map('map', { center: [23.7544, 90.3854], zoom: 14 });

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors',
        maxZoom: 19
    }).addTo(map);

    setTimeout(function () { map.invalidateSize(); }, 500);

    // ── MARKER ICON ───────────────────────────────────────────────────────────────
    function busIcon(moving) {
        return L.divIcon({
            className: '',
            html: '<div style="font-size:28px;line-height:1;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.5));">🚌</div>',
            iconSize: [32, 32],
            iconAnchor: [16, 16],
            popupAnchor: [0, -18]
        });
    }

    // ── STATE ─────────────────────────────────────────────────────────────────────
    var buses = {};
    var selected = null;
    var firstFix = true;

    // ── SIDEBAR ───────────────────────────────────────────────────────────────────
    function renderSidebar() {
        var list = document.getElementById('bus-list');
        var ids = Object.keys(buses);
        var countText = ids.length + ' bus' + (ids.length !== 1 ? 'es' : '') + ' tracked';
        document.getElementById('bus-count').textContent = countText;
        document.getElementById('map-bus-count-label').textContent = countText;

        if (!ids.length) {
            list.innerHTML = '<div style="padding:20px;text-align:center;color:#7a8499;font-size:13px;">No active buses.</div>';
            return;
        }

        list.innerHTML = ids.map(function (id) {
            var b = buses[id];
            var mv = b.speed > 1;
            var sel = selected === id ? ' selected' : '';
            return '<div class="bus-card' + sel + '" onclick="focusBus(\'' + id + '\')">' +
                '<div class="bus-card-top">' +
                '<div class="bus-name">' + b.name + '</div>' +
                '<span class="pill ' + (mv ? 'mv' : 'on') + '"><span class="pill-dot"></span>' + (mv ? 'Moving' : 'Stopped') + '</span>' +
                '</div>' +
                '<div class="bus-route">' + b.route + '</div>' +
                '<div class="bus-stats">' +
                '<div class="stat"><span class="stat-label">Speed</span><span class="stat-value spd">' + b.speed + ' km/h</span></div>' +
                '<div class="stat"><span class="stat-label">Lat</span><span class="stat-value">' + b.lat.toFixed(5) + '</span></div>' +
                '<div class="stat"><span class="stat-label">Lng</span><span class="stat-value">' + b.lng.toFixed(5) + '</span></div>' +
                '</div>' +
                '</div>';
        }).join('');
    }

    function focusBus(id) {
        selected = id;
        var b = buses[id];
        map.setView([b.lat, b.lng], 17, { animate: true });
        if (b.marker) b.marker.openPopup();
        document.getElementById('chip-bus').textContent = 'Tracking: ' + b.name;
        renderSidebar();
        // Auto-close sidebar on mobile after selecting
        if (window.innerWidth <= 640) closeSidebar();
    }

    // ── LOCATION UPDATE ───────────────────────────────────────────────────────────
    function onLocation(data) {
        var id = String(data.bus_id);
        var lat = parseFloat(data.lat);
        var lng = parseFloat(data.lng);
        var spd = parseInt(data.speed) || 0;
        var name = data.name || ('Bus ' + id);
        var route = data.route || 'Campus Route';

        if (isNaN(lat) || isNaN(lng)) return;

        if (buses[id] && buses[id].marker) {
            buses[id].marker.setLatLng([lat, lng]);
            buses[id].marker.setIcon(busIcon(spd > 1));
        } else {
            var m = L.marker([lat, lng], { icon: busIcon(spd > 1) }).addTo(map);
            m.bindPopup('');
            if (!buses[id]) buses[id] = {};
            buses[id].marker = m;
        }

        buses[id].lat = lat;
        buses[id].lng = lng;
        buses[id].speed = spd;
        buses[id].name = name;
        buses[id].route = route;

        buses[id].marker.setPopupContent(
            '<b>' + name + '</b><br>Route: ' + route +
            '<br>Speed: <b style="color:#f5a623">' + spd + ' km/h</b>' +
            '<br><small style="color:#888">' + lat.toFixed(6) + ', ' + lng.toFixed(6) + '</small>'
        );

        if (firstFix) {
            map.setView([lat, lng], 16, { animate: true });
            firstFix = false;
        }

        document.getElementById('chip-time').textContent = 'Updated ' + new Date().toLocaleTimeString();
        renderSidebar();
    }

    // ── WEBSOCKET ─────────────────────────────────────────────────────────────────
    var wsDot = document.getElementById('ws-dot');
    var wsLabel = document.getElementById('ws-label');
    var ws, retry;

    function connect() {
        var proto = location.protocol === 'https:' ? 'wss' : 'ws';
        ws = new WebSocket(proto + '://' + location.host + '/ws/buses/');

        ws.onopen = function () {
            wsDot.classList.add('ok');
            wsLabel.textContent = 'Connected';
            clearTimeout(retry);
        };

        ws.onmessage = function (e) {
            try {
                var d = JSON.parse(e.data);
                if (d.type === 'location_update') onLocation(d);
            } catch (ex) { }
        };

        ws.onclose = function () {
            wsDot.classList.remove('ok');
            wsLabel.textContent = 'Reconnecting...';
            retry = setTimeout(connect, 3000);
        };

        ws.onerror = function () { ws.close(); };
    }

    connect();

    // ── MY LOCATION (blue dot) ────────────────────────────────────────────────────
    var myMarker = null;
    var myCircle = null;
    var followMe = false;

    var myIcon = L.divIcon({
        className: '',
        html: '<div style="position:relative;width:20px;height:20px;">' +
            '<div style="position:absolute;inset:0;border-radius:50%;background:#4a9eff;opacity:0.2;animation:mp 2s ease-out infinite;"></div>' +
            '<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);' +
            'width:14px;height:14px;border-radius:50%;background:#4a9eff;' +
            'border:3px solid white;box-shadow:0 0 8px #4a9eff88;"></div>' +
            '</div>',
        iconSize: [20, 20],
        iconAnchor: [10, 10],
    });

    function onMyPosition(pos) {
        var lat = pos.coords.latitude;
        var lng = pos.coords.longitude;
        var acc = pos.coords.accuracy;

        if (myMarker) {
            myMarker.setLatLng([lat, lng]);
            myCircle.setLatLng([lat, lng]).setRadius(acc);
        } else {
            myMarker = L.marker([lat, lng], { icon: myIcon, zIndexOffset: 1000 })
                .addTo(map)
                .bindPopup('<b style="color:#4a9eff">You are here</b><br><small>' + lat.toFixed(5) + ', ' + lng.toFixed(5) + '</small>');
            myCircle = L.circle([lat, lng], {
                radius: acc, color: '#4a9eff',
                fillColor: '#4a9eff', fillOpacity: 0.08, weight: 1
            }).addTo(map);
            map.setView([lat, lng], 15, { animate: true });
        }

        document.getElementById('chip-me').textContent = 'You: ' + lat.toFixed(4) + ', ' + lng.toFixed(4);
        if (followMe) map.setView([lat, lng], 16, { animate: true });
    }

    if (navigator.geolocation) {
        navigator.geolocation.watchPosition(onMyPosition,
            function () { document.getElementById('chip-me').textContent = 'Location unavailable'; },
            { enableHighAccuracy: true, maximumAge: 5000, timeout: 10000 }
        );
    } else {
        document.getElementById('chip-me').textContent = 'GPS not supported';
    }

    document.getElementById('btn-follow').addEventListener('click', function () {
        followMe = !followMe;
        this.style.background = followMe ? '#4a9eff' : 'rgba(11,15,26,0.9)';
        this.style.color = followMe ? '#fff' : '#e8eaf0';
        this.textContent = followMe ? '⦿ Following you' : '◎ Follow me';
        if (followMe && myMarker) map.setView(myMarker.getLatLng(), 16, { animate: true });
    });
</script>
{% endblock %}
