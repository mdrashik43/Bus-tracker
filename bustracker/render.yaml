services:
  - type: web
    name: bustracker
    runtime: python
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate"
    startCommand: "daphne bustracker.asgi:application --port $PORT --bind 0.0.0.0"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: bustracker.settings_production
      - key: SECRET_KEY
        generateValue: true
      - key: REDIS_URL
        fromService:
          type: redis
          name: bustracker-redis
          property: connectionString
      - key: DATABASE_URL
        fromDatabase:
          name: bustracker-db
          property: connectionString

databases:
  - name: bustracker-db
    plan: free

  - type: redis
    name: bustracker-redis
    plan: free